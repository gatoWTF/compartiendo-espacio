name: CI Pipeline - Parking's Together (Enterprise)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    name: Build, Lint & Test (Quality Gate)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npx jest --passWithNoTests
      env:
        NEXT_PUBLIC_SUPABASE_URL: "http://mock-supabase.local"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key-12345"
      
    - name: Build Turborepo (Dry Run para Vercel)
      run: npx turbo run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: "http://mock-supabase.local"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key-12345"

    - name: Success Notification
      if: success()
      run: echo "🚀 Pipeline Passed! Quality Gate cleared. Ready for Vercel."
